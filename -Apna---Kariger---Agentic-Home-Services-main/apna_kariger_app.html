<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Kariger - Agentic Workflow</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Maps API (with async defer) -->
    <!-- Note: User needs to provide their own key or see the dev watermark -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&libraries=places" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981', // Emerald 500
                        primaryDark: '#047857',
                        secondary: '#3b82f6', // Blue 500
                        dark: '#0f172a',
                    },
                    animation: {
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 390px; height: 844px; background: white; border-radius: 40px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 12px #334155; overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .agent-log-enter { animation: fadeIn 0.3s ease-out forwards; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // --- MOCK DATABASE ---
        const PROVIDERS_DB = [
            { id: "P1", name: "Ali AC Services", category: "AC Technician", lat: 33.651, lng: 72.975, rating: 4.8, distance: 1.2, verified: true, price: 1500, phone: "+92 300 1234567" },
            { id: "P2", name: "CoolBreeze Mechanics", category: "AC Technician", lat: 33.655, lng: 72.970, rating: 4.5, distance: 2.5, verified: true, price: 1200, phone: "+92 321 7654321" },
            { id: "P3", name: "Usman Plumbing", category: "Plumber", lat: 33.649, lng: 72.980, rating: 4.9, distance: 0.8, verified: true, price: 800, phone: "+92 333 1112223" },
            { id: "P4", name: "Hassan Electric", category: "Electrician", lat: 33.650, lng: 72.972, rating: 4.7, distance: 1.5, verified: true, price: 1000, phone: "+92 345 9998887" },
            { id: "P5", name: "Expert AC Repair (G-13)", category: "AC Technician", lat: 33.648, lng: 72.978, rating: 4.9, distance: 0.5, verified: true, price: 2000, phone: "+92 300 5556667" },
        ];

        const SECTORS = {
            "G-13": { lat: 33.650, lng: 72.975 },
            "G-11": { lat: 33.665, lng: 72.990 },
            "F-7": { lat: 33.725, lng: 73.055 },
        };

        // --- AGENT DEFINITIONS ---
        
        class IntentAgent {
            static process(text) {
                const lower = text.toLowerCase();
                let lang = "English";
                if (/[\u0600-\u06FF]/.test(text)) lang = "Urdu";
                else if (["mujhe", "chahiye", "mein", "kal", "subah"].some(w => lower.includes(w))) lang = "Roman Urdu";

                let service = "Unknown";
                if (lower.includes("ac") || lower.includes("cooling")) service = "AC Technician";
                else if (lower.includes("plumb") || lower.includes("nal")) service = "Plumber";
                else if (lower.includes("electric") || lower.includes("bijli")) service = "Electrician";

                let location = "Unknown";
                if (lower.includes("g-13")) location = "G-13";
                else if (lower.includes("g-11")) location = "G-11";
                else if (lower.includes("f-7")) location = "F-7";

                let time = "As soon as possible";
                if (lower.includes("kal subah") || lower.includes("tomorrow morning")) time = "Tomorrow Morning";
                else if (lower.includes("aaj") || lower.includes("today")) time = "Today";

                return { lang, service, location, time, raw: text };
            }
        }

        class DiscoveryAgent {
            static process(intent) {
                // Returns candidates matching the service
                if (intent.service === "Unknown" || intent.location === "Unknown") return [];
                
                // Simulate map query
                const center = SECTORS[intent.location];
                const candidates = PROVIDERS_DB.filter(p => p.category === intent.service);
                
                // Assign dynamic distances based on the sector center
                candidates.forEach(c => {
                    const dx = c.lat - center.lat;
                    const dy = c.lng - center.lng;
                    c.calculatedDistance = Math.sqrt(dx*dx + dy*dy) * 111; // Rough km conversion
                });

                return candidates;
            }
        }

        class RankingAgent {
            static process(candidates) {
                if (!candidates || candidates.length === 0) return { ranked: [], top: null, reasoning: "No providers found." };

                const ranked = [...candidates].sort((a, b) => {
                    // Score = (Rating * 0.5) - (Distance * 0.3) + (Verified ? 1 : 0)
                    const scoreA = (a.rating * 0.5) - (a.calculatedDistance * 0.3) + (a.verified ? 1 : 0);
                    const scoreB = (b.rating * 0.5) - (b.calculatedDistance * 0.3) + (b.verified ? 1 : 0);
                    return scoreB - scoreA;
                });

                const top = ranked[0];
                const reasoning = `Selected ${top.name} because they are highly rated (${top.rating}★) and located just ${top.calculatedDistance.toFixed(1)}km away.`;

                return { ranked, top, reasoning };
            }
        }

        class BookingAgent {
            static process(provider, intent) {
                const bookingId = "BK-" + Math.floor(Math.random() * 90000 + 10000);
                const confirmationMsg = `Apna Kariger: Aapka booking confirm ho gaya hai! ${provider.name} will arrive at ${intent.time} in ${intent.location}.`;
                
                return {
                    status: "CONFIRMED",
                    bookingId,
                    provider,
                    intent,
                    smsSimulation: confirmationMsg
                };
            }
        }

        // --- COMPONENTS ---

        function MapComponent({ center, markers }) {
            const mapRef = useRef(null);
            const [mapInstance, setMapInstance] = useState(null);
            const markerInstances = useRef([]);

            useEffect(() => {
                if (window.google && window.google.maps && mapRef.current && !mapInstance) {
                    const map = new window.google.maps.Map(mapRef.current, {
                        center: center || { lat: 33.684, lng: 73.047 }, // Islamabad default
                        zoom: 14,
                        disableDefaultUI: true,
                    });
                    setMapInstance(map);
                }
            }, [center]);

            useEffect(() => {
                if (mapInstance && center) {
                    mapInstance.panTo(center);
                }
            }, [center, mapInstance]);

            useEffect(() => {
                if (mapInstance) {
                    // Clear old markers
                    markerInstances.current.forEach(m => m.setMap(null));
                    markerInstances.current = [];

                    // Add new markers
                    markers.forEach((m, index) => {
                        const isTop = index === 0;
                        const marker = new window.google.maps.Marker({
                            position: { lat: m.lat, lng: m.lng },
                            map: mapInstance,
                            title: m.name,
                            icon: isTop ? 'http://maps.google.com/mapfiles/ms/icons/green-dot.png' : 'http://maps.google.com/mapfiles/ms/icons/red-dot.png'
                        });
                        markerInstances.current.push(marker);
                    });
                }
            }, [markers, mapInstance]);

            return (
                <div className="relative w-full h-full bg-gray-200">
                    <div ref={mapRef} className="w-full h-full"></div>
                    {!window.google?.maps && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-gray-100 text-gray-500 p-6 text-center">
                            <svg className="w-12 h-12 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path></svg>
                            <p className="font-semibold text-sm">Google Maps API Not Loaded</p>
                            <p className="text-xs mt-1">Please add your API key to the script tag in the HTML file.</p>
                            
                            {/* Mock Visual Map if API fails */}
                            <div className="mt-6 border-2 border-dashed border-gray-300 w-full h-40 rounded-xl relative overflow-hidden bg-green-50">
                                {markers.map((m, i) => (
                                    <div key={i} className={`absolute w-4 h-4 rounded-full shadow-md transform -translate-x-1/2 -translate-y-1/2 ${i===0 ? 'bg-primary z-10 w-5 h-5 border-2 border-white' : 'bg-red-500 border border-white'}`} 
                                         style={{ left: `${50 + (m.lng - center.lng)*1000}%`, top: `${50 - (m.lat - center.lat)*1000}%` }}>
                                    </div>
                                ))}
                                <div className="absolute top-1/2 left-1/2 w-32 h-32 bg-primary opacity-10 rounded-full transform -translate-x-1/2 -translate-y-1/2"></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            const [stage, setStage] = useState('home'); // home, processing, map, receipt
            const [query, setQuery] = useState('Mujhe kal subah G-13 mein AC technician chahiye');
            const [logs, setLogs] = useState([]);
            const [result, setResult] = useState(null);
            const logsEndRef = useRef(null);

            const addLog = (agent, action, detail, color = "text-gray-400") => {
                setLogs(prev => [...prev, { id: Date.now() + Math.random(), agent, action, detail, color }]);
            };

            useEffect(() => {
                if (logsEndRef.current) {
                    logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [logs]);

            const runAgenticWorkflow = async () => {
                if(!query.trim()) return;
                setStage('processing');
                setLogs([]);
                setResult(null);

                // --- 1. Intent Agent ---
                addLog("IntentAgent", "Analyzing input", query, "text-blue-400");
                await new Promise(r => setTimeout(r, 1200));
                const intent = IntentAgent.process(query);
                addLog("IntentAgent", "Extracted", `Service: ${intent.service} | Loc: ${intent.location} | Time: ${intent.time}`, "text-blue-400");

                if(intent.service === "Unknown" || intent.location === "Unknown") {
                    addLog("System", "Error", "Could not understand service or location. Please clarify.", "text-red-400");
                    setTimeout(() => setStage('home'), 2000);
                    return;
                }

                // --- 2. Discovery Agent ---
                await new Promise(r => setTimeout(r, 1000));
                addLog("DiscoveryAgent", "Querying Maps", `Searching for ${intent.service} near ${intent.location}`, "text-yellow-400");
                await new Promise(r => setTimeout(r, 1500));
                const candidates = DiscoveryAgent.process(intent);
                addLog("DiscoveryAgent", "Found", `${candidates.length} candidates found in area.`, "text-yellow-400");

                // --- 3. Ranking Agent ---
                await new Promise(r => setTimeout(r, 1000));
                addLog("RankingAgent", "Evaluating", "Scoring by distance, rating, and verified status...", "text-purple-400");
                await new Promise(r => setTimeout(r, 1500));
                const ranking = RankingAgent.process(candidates);
                addLog("RankingAgent", "Decision", ranking.reasoning, "text-purple-400");

                setResult({ intent, candidates, ranking });
                setStage('map');
            };

            const executeBooking = async () => {
                setStage('processing');
                addLog("BookingAgent", "Initiating", `Booking ${result.ranking.top.name}...`, "text-primary");
                await new Promise(r => setTimeout(r, 1500));
                
                const bookingData = BookingAgent.process(result.ranking.top, result.intent);
                addLog("BookingAgent", "Success", `Booking ID: ${bookingData.bookingId} generated.`, "text-primary");
                
                await new Promise(r => setTimeout(r, 800));
                addLog("BookingAgent", "Follow-Up", "Scheduling reminder SMS to user.", "text-primary");
                
                setResult(prev => ({ ...prev, booking: bookingData }));
                
                await new Promise(r => setTimeout(r, 1000));
                setStage('receipt');
            };

            return (
                <div className="app-container bg-gray-50">
                    {/* Status Bar Mock */}
                    <div className="h-12 w-full flex justify-between items-center px-6 pt-2 z-50 bg-white/80 backdrop-blur-md absolute top-0">
                        <span className="font-bold text-sm">9:41</span>
                        <div className="w-32 h-6 bg-black rounded-b-xl absolute top-0 left-1/2 transform -translate-x-1/2"></div>
                        <span className="flex gap-1">
                            <div className="w-4 h-3 bg-black rounded-sm"></div>
                        </span>
                    </div>

                    <div className="flex-1 overflow-y-auto hide-scrollbar pt-12 pb-20">
                        {/* --- HOME STAGE --- */}
                        {stage === 'home' && (
                            <div className="p-6 h-full flex flex-col animate-fade-in">
                                <div className="mt-8 mb-6">
                                    <h1 className="text-3xl font-extrabold text-dark tracking-tight">Apna Kariger</h1>
                                    <p className="text-gray-500 mt-2 font-medium">Find reliable home services instantly with AI.</p>
                                </div>

                                <div className="grid grid-cols-4 gap-4 mb-8">
                                    {['AC Repair', 'Plumber', 'Electrician', 'Cleaning'].map((s, i) => (
                                        <div key={i} className="flex flex-col items-center gap-2">
                                            <div className="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-2xl border border-gray-100">
                                                {['❄️', '🔧', '⚡', '🧹'][i]}
                                            </div>
                                            <span className="text-xs font-semibold text-gray-600 text-center">{s}</span>
                                        </div>
                                    ))}
                                </div>

                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 mb-4">
                                    <h3 className="text-xs font-bold text-primary uppercase tracking-wider mb-3">AI Assistant</h3>
                                    <p className="text-sm text-gray-700 font-medium mb-4">What do you need help with today?</p>
                                    
                                    <textarea 
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        className="w-full bg-gray-50 border-0 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-primary focus:bg-white transition-all resize-none"
                                        rows="3"
                                        placeholder="e.g., Mujhe kal subah G-13 mein plumber chahiye..."
                                    ></textarea>
                                </div>

                                <button 
                                    onClick={runAgenticWorkflow}
                                    className="w-full bg-dark text-white rounded-2xl py-4 font-bold shadow-lg shadow-gray-900/20 active:scale-95 transition-transform mt-auto"
                                >
                                    Find Kariger
                                </button>
                            </div>
                        )}

                        {/* --- PROCESSING / TRACE LOG STAGE --- */}
                        {stage === 'processing' && (
                            <div className="h-full flex flex-col bg-dark text-white p-6 pt-16 animate-fade-in">
                                <div className="flex items-center gap-3 mb-8">
                                    <div className="w-8 h-8 rounded-full border-2 border-primary border-t-transparent animate-spin"></div>
                                    <h2 className="text-xl font-bold">Agents Orchestrating...</h2>
                                </div>

                                <div className="flex-1 overflow-y-auto hide-scrollbar flex flex-col gap-4">
                                    {logs.map(log => (
                                        <div key={log.id} className="agent-log-enter border-l-2 border-gray-700 pl-4 py-1">
                                            <div className={`text-xs font-bold uppercase tracking-wider ${log.color} mb-1`}>
                                                [{log.agent}] {log.action}
                                            </div>
                                            <div className="text-sm text-gray-300 font-mono leading-relaxed">
                                                {log.detail}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={logsEndRef} />
                                </div>
                            </div>
                        )}

                        {/* --- MAP / RECOMMENDATION STAGE --- */}
                        {stage === 'map' && result && (
                            <div className="h-full flex flex-col relative animate-fade-in">
                                <div className="h-1/2 w-full relative">
                                    <MapComponent 
                                        center={SECTORS[result.intent.location]} 
                                        markers={result.candidates} 
                                    />
                                    {/* Map Overlay Header */}
                                    <div className="absolute top-12 left-0 w-full px-4 z-10">
                                        <div className="bg-white/90 backdrop-blur-md rounded-2xl p-3 shadow-lg flex items-center justify-between">
                                            <div>
                                                <div className="text-xs font-bold text-gray-500 uppercase">Location</div>
                                                <div className="font-bold text-dark">{result.intent.location}, Islamabad</div>
                                            </div>
                                            <div className="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">
                                                {result.candidates.length} Found
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="h-1/2 bg-white rounded-t-3xl -mt-6 z-20 relative p-6 flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
                                    <div className="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                                    
                                    <h3 className="text-xs font-bold text-purple-600 uppercase tracking-wider mb-2 flex items-center gap-1">
                                        ✨ Top Recommendation
                                    </h3>
                                    
                                    <div className="border border-gray-100 bg-gray-50 rounded-2xl p-4 mb-4">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h2 className="text-lg font-bold text-dark">{result.ranking.top.name}</h2>
                                                <p className="text-sm text-gray-500">{result.ranking.top.category}</p>
                                            </div>
                                            <div className="flex items-center gap-1 bg-white px-2 py-1 rounded-lg border border-gray-100 shadow-sm">
                                                <span className="text-yellow-400 text-sm">★</span>
                                                <span className="font-bold text-sm">{result.ranking.top.rating}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-3 mt-4">
                                            <div className="flex items-center gap-2 text-sm text-gray-600 font-medium">
                                                <span className="text-lg">📍</span> {result.ranking.top.calculatedDistance.toFixed(1)} km away
                                            </div>
                                            <div className="flex items-center gap-2 text-sm text-gray-600 font-medium">
                                                <span className="text-lg">💰</span> Est. Rs {result.ranking.top.price}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-purple-50 text-purple-800 p-3 rounded-xl text-xs font-medium leading-relaxed mb-auto border border-purple-100">
                                        <span className="font-bold uppercase tracking-wider mr-1">Agent Reasoning:</span>
                                        {result.ranking.reasoning}
                                    </div>

                                    <div className="flex gap-3 mt-4">
                                        <button onClick={() => setStage('home')} className="flex-1 bg-gray-100 text-dark font-bold py-3.5 rounded-2xl active:scale-95 transition-transform">
                                            Cancel
                                        </button>
                                        <button onClick={executeBooking} className="flex-[2] bg-primary text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-primary/30 active:scale-95 transition-transform">
                                            Confirm Booking
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- RECEIPT & FOLLOW-UP STAGE --- */}
                        {stage === 'receipt' && result?.booking && (
                            <div className="h-full bg-white p-6 pt-20 flex flex-col animate-fade-in relative">
                                
                                {/* Simulated SMS Notification popup */}
                                <div className="absolute top-16 left-4 right-4 bg-gray-900/95 backdrop-blur-md text-white p-4 rounded-2xl shadow-2xl z-50 animate-slide-up flex gap-3">
                                    <div className="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center text-xl shrink-0">💬</div>
                                    <div>
                                        <div className="text-xs text-gray-400 font-bold mb-1">New Message • Apna Kariger</div>
                                        <div className="text-sm font-medium leading-tight">{result.booking.smsSimulation}</div>
                                    </div>
                                </div>

                                <div className="flex flex-col items-center mb-8 mt-16">
                                    <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center text-4xl mb-4">
                                        ✅
                                    </div>
                                    <h2 className="text-2xl font-bold text-dark">Booking Confirmed</h2>
                                    <p className="text-gray-500 text-sm mt-1">Your Kariger is on the way!</p>
                                </div>

                                <div className="bg-gray-50 rounded-3xl p-6 border border-gray-100 mb-auto">
                                    <div className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Receipt Details</div>
                                    
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-end border-b border-gray-200 pb-3">
                                            <div className="text-sm text-gray-500">Provider</div>
                                            <div className="font-bold text-dark text-right">{result.booking.provider.name}</div>
                                        </div>
                                        <div className="flex justify-between items-end border-b border-gray-200 pb-3">
                                            <div className="text-sm text-gray-500">Service</div>
                                            <div className="font-bold text-dark text-right">{result.intent.service}</div>
                                        </div>
                                        <div className="flex justify-between items-end border-b border-gray-200 pb-3">
                                            <div className="text-sm text-gray-500">Date & Time</div>
                                            <div className="font-bold text-dark text-right">{result.intent.time}</div>
                                        </div>
                                        <div className="flex justify-between items-end">
                                            <div className="text-sm text-gray-500">Booking ID</div>
                                            <div className="font-mono font-bold text-primary text-right">{result.booking.bookingId}</div>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => setStage('home')} className="w-full bg-gray-100 text-dark font-bold py-4 rounded-2xl active:scale-95 transition-transform mt-6">
                                    Back to Home
                                </button>
                            </div>
                        )}
                    </div>
                    
                    {/* Fake Home Indicator */}
                    <div className="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1.5 bg-gray-800 rounded-full z-50"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
